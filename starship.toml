add_newline = false

[line_break]
disabled = true

[username]
style_root = "red bold"
format = "ΏθΝ╡ [$user](bold green) "
disabled = false
show_always = true

[hostname]
ssh_only = false
format = 'on [$hostname](bold yellow) '
trim_at = "."
disabled = false

[character]
success_symbol = " [>](bold green)"
error_symbol = " [x](bold red)"
vimcmd_symbol = " [<](bold green)"


#cmd duration
[cmd_duration]
min_time = 10_000  # Show command duration over 10,000 milliseconds (=10 sec)
format = " took [$duration]($style)"

[directory]
truncation_length = 5
truncation_symbol = "ΎΕΧ "
format = "[$path]($style)[$read_only]($read_only_style)"
read_only = "ΏθΦΤ"
style = "bold cyan"

[directory.substitutions]
Applications = "ΎΑΥ "
Documents = "≤░ΙΦ "
Downloads = "ΎΑβ "
Music = "≤░ΟΙ "
Pictures = "≤░Μσ "
Videos = "ΎΑ╜  "
"The Forge" = "≤░Ζχ "

#git
[git_branch]
format = " [$symbol$branch]($style) "
symbol = " Όεξ "
style = "bold green"
always_show_remote = false
only_attached = false
disabled = false

[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '
style = "bold yellow"


[git_commit]
commit_hash_length = 4
style = "bold white"
tag_symbol = " Ότ╝ "

[git_metrics]
added_style = "bold green"
deleted_style = "bold red"
only_nonzero_diffs = true
format = '([+$added]($added_style) )([-$deleted]($deleted_style) )'
disabled = true

[git_status]
conflicted = " Όερ "
ahead = "έΘκ"
behind = "[έΘμ${count}](bold dimmed blue)"
diverged = "έΘΧ${ahead_count}έΘμ${behind_count}"
untracked = "[?${count}](bold blue)"
modified ="[!${count}](bold yellow)"
staged = "[+${count}](bold yellow)"
renamed = "┬╗ ├Ω${count}"
deleted = "[έεα ├Ω${count}](bold red)"
format = "$all_status$ahead_behind"

[memory_usage]
format = "$symbol[${ram}( | ${swap})]($style) "
threshold = 70
style = "bold dimmed white"
disabled = false

[package]
disabled = true

[python]
format = "[$symbol$version](bold ) "
symbol =  " ΌαΗ "


[lua]
format = "[$symbol($version )]($style)"
detect_extensions = ["lua"]
symbol =  " Όαι "
style = "bold red"


[java]
format = "[$symbol($version )]($style)"
detect_extensions = ["java", "class", "gradle", "jar", "cljc"]
symbol =" ΌΚΨ "
style = "white bold"

[nodejs]
format = "[$symbol($version )]($style)"
detect_extensions = ["js", "mjs", "cjs", "ts", "mts", "cts"]
symbol =" ΌαΝ "
style = "bold green"

[golang]
format = "[$symbol($version )]($style)"
detect_extensions = ["go"]
detect_files = ["go.mod", "go.sum"]
symbol = " Όαπ "
style = "bold cyan"

[docker_context]
format = "[$symbol$context]($style) "
detect_extensions = []
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile"]
symbol = " ΎΙθ "
style = "bold blue"

[rust]
format = "[$symbol$version]($style) "
style = "bold green"
symbol= " Όηρ "

#[time]
#time_format = "%T"
#format = "$time($style) "
#style = "bright-white"
#disabled = false

[sudo]
format = "[$symbol]($style)"
symbol = " ≤▒Χ╡ "
disabled = false

[jobs]
symbol = " "
threshold = 1

[status]
format = "[$status]($style) "
disabled = false

#[battery]
#full_symbol = " "
#charging_symbol = " "
#discharging_symbol = " "

# [[battery.display]]
