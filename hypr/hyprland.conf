# Hyprland Config
$HYPR_PATH = ~/.config/hypr/

$active_border = rgb(a7c080)
$inactive_border = rgb(45475a)


source = $HYPR_PATH/startup.conf
source = $HYPR_PATH/keybindings.conf
source = $HYPR_PATH/windowrules.conf

monitor=DP-1,3440x1440@165,0x0,1
monitor=HDMI-A-2,2560x1440@60,3440x-560,1,transform,3  # Dell vertical: rotated 180° (transform 1→3), right of DP-1, vertically centered. Panel caps at 60Hz over HDMI.
monitor=HDMI-A-1,1920x1080@60,760x1440,1  # Arzopa 16" portable, centered below DP-1 (HDMI link caps at 60Hz; USB-C DP-alt could go higher)
monitor=,preferred,auto,1

workspace = 1, monitor:DP-1, default:true, layout:scrolling
workspace = 2, monitor:DP-1, layout:scrolling
workspace = 3, monitor:DP-1, layout:scrolling
workspace = 4, monitor:DP-1, layout:scrolling
workspace = 5, monitor:DP-1, layout:scrolling
workspace = 6, monitor:DP-1, layout:scrolling
workspace = 7, monitor:DP-1, layout:scrolling
workspace = 8, monitor:DP-1, layout:scrolling
workspace = 9, monitor:DP-1, layout:scrolling
workspace = 11, monitor:HDMI-A-2, default:true, layout:scrolling
workspace = 12, monitor:HDMI-A-2, layout:scrolling
workspace = 13, monitor:HDMI-A-2, layout:scrolling
workspace = 14, monitor:HDMI-A-2, layout:scrolling
workspace = 15, monitor:HDMI-A-2, layout:scrolling
workspace = 21, monitor:HDMI-A-1, default:true, layout:scrolling
workspace = 22, monitor:HDMI-A-1, layout:scrolling
workspace = 23, monitor:HDMI-A-1, layout:scrolling
workspace = 24, monitor:HDMI-A-1, layout:scrolling
workspace = 25, monitor:HDMI-A-1, layout:scrolling

# Native scrolling layout (replaces hyprscroller plugin)
# See: https://wiki.hypr.land/Configuring/Scrolling-Layout/
scrolling {
    column_width = 0.5
    fullscreen_on_one_column = true
    focus_fit_method = 1
    follow_focus = true
    explicit_column_widths = 0.333, 0.5, 0.667, 1.0
}

input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    touchpad {
        natural_scroll = no
    }

    sensitivity = 0
}

general {
    gaps_in = 2
    gaps_out = 6
    border_size = 2
    col.active_border = $active_border
    col.inactive_border = $inactive_border
    resize_on_border = true

    layout = scrolling
}

decoration {
   blur {
        enabled = true
        size = 6
        passes = 2
        xray = true
        ignore_opacity = true
   }
   rounding = 5
}

animations {
    enabled = yes
    bezier = wind, 0.05, 0.9, 0.1, 1.05
    bezier = winIn, 0.1, 1.1, 0.1, 1.1
    bezier = winOut, 0.3, -0.3, 0, 1
    bezier = liner, 1, 1, 1, 1
    bezier = quart, 0.25, 1, 0.5, 1
    bezier = overshot, 0.13, 0.99, 0.29, 1.1

    animation = windowsIn, 1, 6, winIn, slide
    animation = windowsOut, 1, 5, winOut, slide
    animation = windowsMove, 1, 5, wind, slide
    animation = border, 1, 6, default
    animation = borderangle, 1, 6, quart
    animation = fade, 1, 6, quart
    animation = workspaces, 1, 6, overshot, slide
    # animation = layers, 1, 6, quart, slide
}

dwindle {
    pseudotile = yes
    preserve_split = yes
}

binds {
    allow_workspace_cycles = true
    workspace_back_and_forth = true
    workspace_center_on = 1
    movefocus_cycles_fullscreen = true
    window_direction_monitor_fallback = true
}

env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Bibata-Modern-Ice
env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = MOZ_DISABLE_RDD_SANDBOX,1
env = MOZ_ENABLE_WAYLAND,1
env = OZONE_PLATFORM,wayland
env = SDL_VIDEO_FULLSCREEN_HEAD,1
env = QT_QPA_PLATFORMTHEME,qt6ct
env = WLR_OUTPUT_PRIMARY,DP-1
