# Hyprland Config
$HYPR_PATH = ~/.config/hypr/

$active_border = rgb(a7c080)
$inactive_border = rgb(45475a)


source = $HYPR_PATH/startup.conf
source = $HYPR_PATH/keybindings.conf
source = $HYPR_PATH/windowrules.conf

monitor=,preferred,auto,1
monitor=DP-1,3440x1440@165,0x0,1

# Vertical 27" 1440p monitor (uncomment when connected)
# Run `hyprctl monitors` to find the connector name and replace DP-2
# transform: 1 = 90° CW (ports on top), 3 = 90° CCW (ports on bottom)
# monitor=DP-2,2560x1440@60,3440x0,1,transform,1
# monitor=DP-2,2560x1440@75,3440x0,1,transform,1  # 75Hz overclock attempt

# Workspace bindings (uncomment and adjust connector name)
# Main monitor keeps 1-10, vertical gets 11-15
# workspace = 1, monitor:DP-1, default:true
# workspace = 2, monitor:DP-1
# workspace = 3, monitor:DP-1
# workspace = 4, monitor:DP-1
# workspace = 5, monitor:DP-1
# workspace = 6, monitor:DP-1
# workspace = 7, monitor:DP-1
# workspace = 8, monitor:DP-1
# workspace = 9, monitor:DP-1
# workspace = 10, monitor:DP-1
# workspace = 11, monitor:DP-2, default:true
# workspace = 12, monitor:DP-2
# workspace = 13, monitor:DP-2
# workspace = 14, monitor:DP-2
# workspace = 15, monitor:DP-2

plugin {
    scroller {
        column_default_width = onehalf  # options: onethird, onehalf, twothirds, one, maximized
        focus_wrap = true
    }
}

input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    touchpad {
        natural_scroll = no
    }

    sensitivity = 0
}

general {
    gaps_in = 2
    gaps_out = 6
    border_size = 2
    col.active_border = $active_border
    col.inactive_border = $inactive_border
    resize_on_border = true

    layout = scroller
}

decoration {
   blur {
        enabled = true
        size = 6
        passes = 2
        xray = true
        ignore_opacity = true
   }
   rounding = 5
}

animations {
    enabled = yes
    bezier = wind, 0.05, 0.9, 0.1, 1.05
    bezier = winIn, 0.1, 1.1, 0.1, 1.1
    bezier = winOut, 0.3, -0.3, 0, 1
    bezier = liner, 1, 1, 1, 1
    bezier = quart, 0.25, 1, 0.5, 1
    bezier = overshot, 0.13, 0.99, 0.29, 1.1

    animation = windowsIn, 1, 6, winIn, slide
    animation = windowsOut, 1, 5, winOut, slide
    animation = windowsMove, 1, 5, wind, slide
    animation = border, 1, 6, default
    animation = borderangle, 1, 6, quart
    animation = fade, 1, 6, quart
    animation = workspaces, 1, 6, overshot, slide
    # animation = layers, 1, 6, quart, slide
}

dwindle {
    pseudotile = yes
    preserve_split = yes
}

binds {
    allow_workspace_cycles = true
    workspace_back_and_forth = true
    workspace_center_on = 1
    movefocus_cycles_fullscreen = true
    window_direction_monitor_fallback = true
}

env = WLR_NO_HARDWARE_CURSORS,1
env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = MOZ_DISABLE_RDD_SANDBOX,1
env = MOZ_ENABLE_WAYLAND,1
env = OZONE_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,qt6ct
