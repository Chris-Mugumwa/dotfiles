# General
bind = SUPER,SPACE , togglefloating, 
bind = SUPER, F, fullscreen,
bind = SUPER, Q, killactive, 
bind = SUPER SHIFT, Q, exit, 
# bind = SUPER, C, exec, hyprctl dispatch centerwindow  # Replaced by scroller:alignwindow below
bind = SUPER, T, exec, hyprctl dispatch togglesplit
bind = SUPER, P, pin, active

# ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
# ┃                          SCROLLER LAYOUT                                   ┃
# ┃  Provided by hyprscroller plugin (loaded via hyprpm)                       ┃
# ┃  Scroller-specific commands use: layoutmsg, <command>                      ┃
# ┃  See: https://github.com/cpiber/hyprscroller                              ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

# Layout toggle (scroller <-> dwindle)
bind = SUPER SHIFT, D, exec, ~/.config/hypr/scripts/toggle-layout.sh

# Focus navigation (movefocus works on both scroller and dwindle)
bind = SUPER, H, movefocus, l
bind = SUPER, L, movefocus, r
bind = SUPER, K, movefocus, u
bind = SUPER, J, movefocus, d
bind = SUPER, left, movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up, movefocus, u
bind = SUPER, down, movefocus, d

# Move window
bind = SUPER SHIFT, H, movewindow, l
bind = SUPER SHIFT, L, movewindow, r
bind = SUPER SHIFT, K, movewindow, u
bind = SUPER SHIFT, J, movewindow, d
bind = SUPER SHIFT, left, movewindow, l
bind = SUPER SHIFT, right, movewindow, r
bind = SUPER SHIFT, up, movewindow, u
bind = SUPER SHIFT, down, movewindow, d

# Size cycling - cycle through explicit_column_widths (0.333 -> 0.5 -> 0.667 -> 1.0)
bind = SUPER, equal, layoutmsg, colresize +conf
bind = SUPER, minus, layoutmsg, colresize -conf

# Fit columns to screen
bind = SUPER, C, layoutmsg, fit active

# Swap columns
bind = SUPER, I, layoutmsg, swapcol l
bind = SUPER SHIFT, I, layoutmsg, swapcol r

# Promote window to new column
bind = SUPER, O, layoutmsg, promote

# Toggle fit method (center vs fit)
bind = SUPER SHIFT, C, layoutmsg, togglefit

# bind = SUPER SHIFT, left, movewindow, l
# bind = SUPER SHIFT, right, movewindow, r
# bind = SUPER SHIFT, up, movewindow, u
# bind = SUPER SHIFT, down, movewindow, d

# Focus other monitor
bind = SUPER, TAB, focusmonitor, +1

# Special Window/Scrachpad
bind = SUPER, S, togglespecialworkspace
bind = SUPER SHIFT, S, movetoworkspace, special

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Workspaces - Independent per monitor
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# DP-1 (ultrawide): workspaces 1-9
# HDMI-A-2 (Dell vertical): workspaces 11-15
# HDMI-A-1 (Arzopa portable): workspaces 21-25
# Super+1-5 targets the currently focused monitor

# Switch workspace on focused monitor
bind = SUPER, 1, exec, ~/.config/hypr/scripts/workspace.sh switch 1
bind = SUPER, 2, exec, ~/.config/hypr/scripts/workspace.sh switch 2
bind = SUPER, 3, exec, ~/.config/hypr/scripts/workspace.sh switch 3
bind = SUPER, 4, exec, ~/.config/hypr/scripts/workspace.sh switch 4
bind = SUPER, 5, exec, ~/.config/hypr/scripts/workspace.sh switch 5
bind = SUPER, 6, exec, ~/.config/hypr/scripts/workspace.sh switch 6
bind = SUPER, 7, exec, ~/.config/hypr/scripts/workspace.sh switch 7
bind = SUPER, 8, exec, ~/.config/hypr/scripts/workspace.sh switch 8
bind = SUPER, 9, exec, ~/.config/hypr/scripts/workspace.sh switch 9

# Move active window to workspace on focused monitor (with focus)
bind = SUPER CTRL, 1, exec, ~/.config/hypr/scripts/workspace.sh move 1
bind = SUPER CTRL, 2, exec, ~/.config/hypr/scripts/workspace.sh move 2
bind = SUPER CTRL, 3, exec, ~/.config/hypr/scripts/workspace.sh move 3
bind = SUPER CTRL, 4, exec, ~/.config/hypr/scripts/workspace.sh move 4
bind = SUPER CTRL, 5, exec, ~/.config/hypr/scripts/workspace.sh move 5
bind = SUPER CTRL, 6, exec, ~/.config/hypr/scripts/workspace.sh move 6
bind = SUPER CTRL, 7, exec, ~/.config/hypr/scripts/workspace.sh move 7
bind = SUPER CTRL, 8, exec, ~/.config/hypr/scripts/workspace.sh move 8
bind = SUPER CTRL, 9, exec, ~/.config/hypr/scripts/workspace.sh move 9

# Move active window to workspace on focused monitor (silent)
bind = SUPER SHIFT, 1, exec, ~/.config/hypr/scripts/workspace.sh movesilent 1
bind = SUPER SHIFT, 2, exec, ~/.config/hypr/scripts/workspace.sh movesilent 2
bind = SUPER SHIFT, 3, exec, ~/.config/hypr/scripts/workspace.sh movesilent 3
bind = SUPER SHIFT, 4, exec, ~/.config/hypr/scripts/workspace.sh movesilent 4
bind = SUPER SHIFT, 5, exec, ~/.config/hypr/scripts/workspace.sh movesilent 5
bind = SUPER SHIFT, 6, exec, ~/.config/hypr/scripts/workspace.sh movesilent 6
bind = SUPER SHIFT, 7, exec, ~/.config/hypr/scripts/workspace.sh movesilent 7
bind = SUPER SHIFT, 8, exec, ~/.config/hypr/scripts/workspace.sh movesilent 8
bind = SUPER SHIFT, 9, exec, ~/.config/hypr/scripts/workspace.sh movesilent 9

# Cycle through workspaces on focused monitor
bind = SUPER, PERIOD, exec, ~/.config/hypr/scripts/workspace.sh cycle next
bind = SUPER, COMMA, exec, ~/.config/hypr/scripts/workspace.sh cycle prev

# Scroll through existing workspaces with mainMod + scroll
bind = SUPER, mouse_down, workspace, e+1
bind = SUPER, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

# Volumme Control (pipewire)
# binde=, XF86AudioRaiseVolume, exec, ~/.config/dunst/scripts/volume.sh volume_up
# binde=, XF86AudioLowerVolume, exec, ~/.config/dunst/scripts/volume.sh volume_down
binde =, XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.4 @DEFAULT_AUDIO_SINK@ 5%+
binde =, XF86AudioLowerVolume, exec, wpctl set-volume -l 1.4 @DEFAULT_AUDIO_SINK@ 5%-
bind =, XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
binde=,XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise
binde=,XF86AudioLowerVolume, exec, swayosd-client --output-volume lower

# Media Controls
bind =, XF86AudioPlay, exec, playerctl play-pause
bind =, XF86AudioPause, exec, playerctl play-pause
bind =, XF86AudioNext, exec, playerctl next
bind =, XF86AudioPrev, exec, playerctl previous
bind =, Prior, exec, playerctl next
bind =, Next, exec, playerctl previous

# Screenshot/Screen Recording
bind = ALT, S, exec, bash -c ~/.config/hypr/scripts/screenshot.sh 
bind = ALT, R, exec, wf-recorder -f $(xdg-user-dir VIDEOS)/$(date +'%H:%M:%S_%d-%m-%Y.mp4') | notify-send "Recording Started"
bind = ALT SHIFT, R, exec, killall -s SIGINT wf-recorder && notify-send "Recording Saved"

# Apps
bind = SUPER, RETURN, exec, kitty
# Dropdown Kitty (quake-style terminal at top of screen)
bind = SUPER SHIFT, RETURN, exec, kitty --class kitty-dropdown

# Launchers/Scripts
bind = SUPER, D, exec, ~/.config/hypr/dmenu.sh
bind = SUPER, A , exec,  rofi -show drun -show-icons
bind = SUPER, V, exec, cliphist list | rofi -dmenu -theme-str 'configuration{dmenu{display-name:"󰅌 ";}} listview{scrollbar:true;}' | cliphist decode | wl-copy
# File Manager
bind = SUPER,E, exec, nemo
# Emoji Picker
bind = SUPER SHIFT, E, exec, rofi -modi emoji -show emoji -config ~/.config/rofi/launchers/type-1/style-6.rasi
bind = SUPER, N, exec,  swaync-client -t -sw
bind = SUPER SHIFT, T, exec, ~/.config/hypr/scripts/theme-switcher.sh
bind = SUPER SHIFT, W, exec, ~/.config/hypr/scripts/wallpaper-switcher.sh
bind = SUPER ALT , L , exec, ~/.config/swaylock/lock.sh
bind = SUPER, X , exec, ~/.config/rofi/powermenu/launch.sh 
bind = SUPER, W, exec, killall waybar && waybar

#Applications
bind = SUPER, B, exec, zen-browser
bind = SUPER, G, exec, ~/.config/rofi/gamelauncher/launch.sh
