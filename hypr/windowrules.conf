# Window rules (v0.54+ block syntax)

windowrule {
    name = keepassxc-float
    match:class = ^(org\.keepassxc\.KeePassXC)$
    float = yes
    size = 800 600
    center = yes
}

windowrule {
    name = copyq-float
    match:class = ^(com\.github\.hluk\.copyq)$
    float = yes
}

windowrule {
    name = wezterm-float
    match:class = ^(org\.wezfurlong\.wezterm)$
    float = yes
}

windowrule {
    name = obsidian-opacity
    match:class = ^(obsidian)$
    opacity = 0.9 0.9
}

windowrule {
    name = spotify-workspace
    match:class = ^(spotify)$
    workspace = 4 silent
}

windowrule {
    name = kitty-dropdown
    match:class = ^(kitty-dropdown)$
    float = yes
    size = 2000 500
    move = 720 75
    animation = slide
}

windowrule {
    name = emulator-float
    match:class = ^(Emulator)$
    float = yes
    center = yes
}

windowrule {
    name = emulator-float-title
    match:title = ^(Emulator|Android Emulator)(.*)$
    float = yes
}

windowrule {
    name = qs-master-popup
    match:title = ^(qs-master)$
    float = yes
    pin = yes
    border_size = 0
}

windowrule {
    name = games-to-ultrawide
    match:class = ^(steam_app_.*|gamescope|lutris|heroic)$
    monitor = DP-1
    fullscreen = true
}
