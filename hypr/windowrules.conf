# Window rules v2 (modern syntax)
windowrulev2 = float, class:^(org\.keepassxc\.KeePassXC)$
windowrulev2 = size 800 600, class:^(org\.keepassxc\.KeePassXC)$
windowrulev2 = center, class:^(org\.keepassxc\.KeePassXC)$
windowrulev2 = float, class:^(com\.github\.hluk\.copyq)$
# windowrulev2 = float, class:^(MEGAsync)$
windowrulev2 = float, class:^(org\.wezfurlong\.wezterm)$
windowrulev2 = opacity 0.9 0.9, class:^(obsidian)$

# Spotify - always open on workspace 4
windowrulev2 = workspace 4 silent, class:^(spotify)$

# Vertical monitor scroller settings (uncomment when second monitor connected)
# Full-width columns work better on vertical displays
# workspace = 11, layoutopt:scroller:column_default_width one
# workspace = 12, layoutopt:scroller:column_default_width one
# workspace = 13, layoutopt:scroller:column_default_width one
# workspace = 14, layoutopt:scroller:column_default_width one
# workspace = 15, layoutopt:scroller:column_default_width one

# Dropdown Kitty terminal (quake-style)
windowrulev2 = float, class:^(kitty-dropdown)$
windowrulev2 = size 2000 500, class:^(kitty-dropdown)$
windowrulev2 = move 720 75, class:^(kitty-dropdown)$
windowrulev2 = animation slide, class:^(kitty-dropdown)$

# Android Emulator - float
windowrulev2 = float, class:^(Emulator)$
windowrulev2 = float, title:^(Emulator)(.*)$
windowrulev2 = float, title:^(Android Emulator)(.*)$
windowrulev2 = center, class:^(Emulator)$

